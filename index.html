<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aurora Birthday - Full Experience Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: #000814; color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
        }

        /* --- 1. HIỆU ỨNG NỀN & VIỀN --- */
        .corner-border {
            position: fixed; width: 60px; height: 60px;
            border: 3px solid transparent; z-index: 100;
            pointer-events: none; transition: 1s; opacity: 0;
        }
        .top-left { top: 15px; left: 15px; border-top-color: #00f2fe; border-left-color: #00f2fe; border-radius: 8px 0 0 0; }
        .top-right { top: 15px; right: 15px; border-top-color: #00f2fe; border-right-color: #00f2fe; border-radius: 0 8px 0 0; }
        .bottom-left { bottom: 15px; left: 15px; border-bottom-color: #4facfe; border-left-color: #4facfe; border-radius: 0 0 0 8px; }
        .bottom-right { bottom: 15px; right: 15px; border-bottom-color: #4facfe; border-right-color: #4facfe; border-radius: 0 0 8px 0; }

        .party-mode .corner-border { opacity: 1; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); animation: borderGlow 2s infinite alternate; }
        @keyframes borderGlow { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(45deg); } }

        .aurora-container { position: fixed; inset: 0; z-index: -1; background: #000814; overflow: hidden; }
        .aurora-bg {
            position: absolute; inset: -50%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.1), transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(183, 0, 255, 0.1), transparent 40%);
            filter: blur(60px); animation: auroraMove 15s infinite alternate ease-in-out; opacity: 0.6;
        }
        @keyframes auroraMove { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(5%, 5%) rotate(8deg); } }

        /* --- 2. THANH NHẠC YOUTUBE & NÚT DỪNG/PHÁT --- */
        .music-player {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; padding: 15px;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 254, 0.4); border-radius: 20px;
            z-index: 2000; display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5); transition: 0.5s;
        }
        .music-player input {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; color: #fff; padding: 10px; font-size: 14px; outline: none; width: 100%;
        }
        .music-control { display: flex; gap: 10px; }
        .music-player button {
            flex: 1; border: none; border-radius: 12px; color: #000; font-weight: bold; 
            padding: 12px; cursor: pointer; transition: 0.3s;
        }
        .music-player .btn-play { background: linear-gradient(45deg, #00f2fe, #4facfe); }
        .music-player .btn-toggle { background: linear-gradient(45deg, #4facfe, #a29bfe); color: #fff; opacity: 0.5; cursor: not-allowed; }
        .music-player .btn-toggle.active { opacity: 1; cursor: pointer; }
        #music-status { font-size: 11px; color: #00f2fe; text-align: center; font-weight: bold; }

        /* --- 3. HỘP QUÀ --- */
        .gift-container { text-align: center; cursor: pointer; z-index: 100; position: relative; }
        .gift-box { width: 140px; height: 110px; background: #ff4757; border-radius: 0 0 10px 10px; position: relative; margin: 50px auto 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .gift-box::after { content: ''; position: absolute; width: 25px; height: 100%; background: #ffdd59; left: 50%; transform: translateX(-50%); }
        .lid { width: 160px; height: 35px; background: #ff6b81; position: absolute; top: -35px; left: -10px; border-radius: 5px; z-index: 10; }
        .lid::before { content: '🎀'; position: absolute; top: -42px; left: 50%; transform: translateX(-50%); font-size: 45px; }

        .opened .lid { transform: translateY(-300px) rotate(20deg); opacity: 0; transition: 0.8s; }
        .opened .gift-box { transform: scale(0); opacity: 0; transition: 0.5s 0.2s; }

        /* --- 4. GIAO DIỆN CHÍNH & CHỮ CHUYỂN ĐỘNG --- */
        #party-ui { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: space-around; align-items: center; padding: 20px; z-index: 10; }
        .horn-battle { display: flex; justify-content: space-between; width: 90%; max-width: 450px; }
        .horn { font-size: 70px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.5)); }
        #hornR { transform: scaleX(-1); }
        .horn:active { transform: scale(1.2); }

        /* HIỆU ỨNG CHỮ CHUYỂN ĐỘNG (Rainbow Lấp Lánh) */
        h1 { 
            font-size: 2.5rem; text-align: center; font-weight: 800;
            background: linear-gradient(to right, #00f2fe, #fff, #4facfe, #fff, #00f2fe);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 2px;
            animation: rainbowGlow 4s linear infinite;
        }

        @keyframes rainbowGlow {
            to { background-position: 200% center; }
        }

        .controls { display: flex; flex-direction: column; gap: 12px; width: 80%; max-width: 300px; }
        .btn { padding: 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; color: white; background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }

        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
        #yt-player { display: none; }
    </style>
</head>
<body>

    <div class="corner-border top-left"></div>
    <div class="corner-border top-right"></div>
    <div class="corner-border bottom-left"></div>
    <div class="corner-border bottom-right"></div>

    <div class="aurora-container"><div class="aurora-bg"></div></div>

    <div id="yt-player"></div>

    <div class="music-player" id="music-panel">
        <input type="text" id="yt-link" placeholder="Dán link YouTube (Ví dụ: https://youtu.be/abcxyz)">
        <div class="music-control">
            <button onclick="loadMusic()" class="btn-play">PHÁT NHẠC NỀN 🎵</button>
            <button onclick="toggleMusic()" class="btn-toggle" id="music-toggle-btn">DỪNG ⏸️</button>
        </div>
        <span id="music-status">Sẵn sàng phát nhạc</span>
    </div>

    <div class="gift-container" id="gift" onclick="openGift()">
        <div class="gift-box"><div class="lid"></div></div>
        <p style="color: #00f2fe; margin-top: 25px; font-weight: bold; letter-spacing: 1px;">CHẠM ĐỂ MỞ QUÀ ✨</p>
    </div>

    <div id="party-ui">
        <div class="horn-battle">
            <div class="horn" id="hornL" onclick="playHorn(event, 'left')">🎺</div>
            <div class="horn" id="hornR" onclick="playHorn(event, 'right')">🎺</div>
        </div>
        <h1>Happy Birthday</h1>
        <div class="controls">
            <button class="btn" onclick="spawnEmoji('🎂')">TẶNG BÁNH KEM 🎂</button>
            <button class="btn" onclick="multiFire()">BẮN PHÁO HOA ✨</button>
        </div>
        <div style="height: 120px;"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let player;
        let audioCtx = null;
        let apiReady = false;
        let isMusicPlaying = false;

        // --- 1. Fix lỗi âm thanh còi ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playNote(f) {
            initAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.value = f;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.5);
        }

        // --- 2. YouTube Logic (Full Feature: Play, Pause, Resume) ---
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0',
                playerVars: { 'autoplay': 1, 'controls': 0 },
                events: {
                    'onReady': () => { apiReady = true; console.log("YT Ready") },
                    'onError': () => { 
                        document.body.style.cursor = 'default';
                        document.getElementById('music-status').innerText = "❌ Lỗi YouTube!";
                    }
                }
            });
        }

        function loadMusic() {
            const linkInput = document.getElementById('yt-link');
            const videoId = extractVideoID(linkInput.value);
            const status = document.getElementById('music-status');
            const toggleBtn = document.getElementById('music-toggle-btn');

            if (videoId && apiReady) {
                document.body.style.cursor = 'wait';
                status.innerText = "⌛ Đang nạp nhạc...";
                
                player.loadVideoById(videoId);
                player.mute(); // Lách luật autoplay
                player.playVideo();
                setTimeout(() => {
                    player.unMute();
                    player.setVolume(80);
                    status.innerText = "🎵 Nhạc đã lên! ";
                    toggleBtn.classList.add('active'); // Kích hoạt nút dừng
                    toggleBtn.innerText = "DỪNG ⏸️";
                    isMusicPlaying = true;
                    document.body.style.cursor = 'default';
                }, 2000);
            } else { alert("Link YouTube không đúng hoặc API chưa sẵn sàng!"); }
        }

        // Hàm bật/dừng nhạc
        function toggleMusic() {
            const toggleBtn = document.getElementById('music-toggle-btn');
            if (!player || !apiReady || !toggleBtn.classList.contains('active')) return;

            if (isMusicPlaying) {
                player.pauseVideo();
                toggleBtn.innerText = "PHÁT ▶️";
                isMusicPlaying = false;
            } else {
                player.playVideo();
                toggleBtn.innerText = "DỪNG ⏸️";
                isMusicPlaying = true;
            }
        }

        function extractVideoID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : null;
        }

        // --- 3. Hiệu ứng Canvas ---
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function openGift() {
            initAudio();
            document.getElementById('gift').classList.add('opened');
            setTimeout(() => {
                document.getElementById('gift').style.display = 'none';
                document.body.classList.add('party-mode');
                document.getElementById('party-ui').style.display = 'flex';
                // Bắn pháo hoa khởi động
                for(let i=0; i<3; i++) setTimeout(multiFire, i * 400);
                animate();
            }, 700);
        }

        function playHorn(e, side) {
            playNote(side === 'left' ? 440 : 554);
            const rect = e.target.getBoundingClientRect();
            const x = side === 'left' ? rect.right : rect.left;
            for(let i=0; i<8; i++) particles.push(new Particle(x, rect.top + 35, null, '✨', side));
        }

        function spawnEmoji(e) {
            for(let i=0; i<15; i++) particles.push(new Particle(canvas.width/2, canvas.height, null, e, 'up'));
        }

        function multiFire() {
            const colors = ['#00f2fe', '#00ff88', '#b700ff', '#ffffff'];
            const centerX = Math.random() * canvas.width;
            const centerY = Math.random() * (canvas.height * 0.6);
            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            for(let i=0; i<45; i++) {
                const angle = (Math.PI * 2 / 45) * i;
                const speed = 2 + Math.random() * 5;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                particles.push(new Particle(centerX, centerY, randomColor, 'dot', null, vx, vy));
            }
        }

        class Particle {
            constructor(x, y, color, type, dir, vx, vy) {
                this.x = x; this.y = y; this.color = color; this.type = type;
                this.opacity = 1; this.size = type === 'dot' ? Math.random() * 3 + 1 : 28;
                if (vx !== undefined) { this.vx = vx; this.vy = vy; }
                else {
                    this.vx = (dir === 'left') ? 4+Math.random()*6 : (dir === 'right') ? -(4+Math.random()*6) : (Math.random()-0.5)*10;
                    this.vy = (dir === 'up') ? -(10+Math.random()*12) : (Math.random()-0.5)*10;
                }
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.15; this.opacity -= 0.015; }
            draw() {
                ctx.globalAlpha = this.opacity;
                if(this.type === 'dot') {
                    ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                } else { ctx.font = `${this.size}px Arial`; ctx.fillText(this.type, this.x, this.y); }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Stardust lấp lánh nhẹ
            if(Math.random() > 0.9) particles.push(new Particle(Math.random()*canvas.width, canvas.height, '#ffffff', 'dot', 'up'));
            particles = particles.filter(p => p.opacity > 0);
            for(let p of particles) { p.update(); p.draw(); }
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
